<!DOCTYPE html>
<html>
<head>
    <title>Fest Flow Dashboard</title>

    <!-- External CSS -->
    <link rel="stylesheet" type="text/css" href="css/style.css" />

    <!-- Internal CSS -->
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
        }
        h1 {
            margin-top: 20px;
        }
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
        }
        .card {
            width: 200px;
            background: white;
            padding: 15px;
            border: 1px solid white;
            cursor: pointer;
            border-radius:5pt;
        }
        .card img {
            width: 100%;
            height: 120px;
        }
        .card:hover {
            background-color: #e6f2ff;
        }
        .menu {
            margin-top: 30px;
        }
        .menu a {
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }
        
    </style>
</head>

<body>

    <!-- Heading -->
    <div class="heading">
        <h1>Fest Flow</h1>
    </div>
	<div class="menu">
        <a href="themes.html">Design Theme</a>
        <a href="sponsors.html">Sponsors</a>
        <a href="guests.html">Guests</a>
        <a href="event_order.html">Events</a>
        <a href="promotions.html">Promotions</a>
        <a href="brochure.html">Brochure</a>
    </div>

    <!-- Dashboard -->
    
    <div class="container">
        <div class="card" onclick="location.href='themes.html'">
            <img src="design.jpg" alt="Theme">
            <h3>Design Theme</h3>
            <p>Choose event themes for decorations</p>
        </div>

        <div class="card" onclick="location.href='sponsors.html'">
            <img src="sponsors.jpg" alt="Sponsors">
            <h3>Sponsors</h3>
            <p>View and edit sponsors list</p>
        </div>

        <div class="card" onclick="location.href='guests.html'">
            <img src="guests.jpg" alt="Guests">
            <h3>Volunteer</h3>
            <p>Manage and support guests</p>
        </div>

        <div class="card" onclick="location.href='budget.html'">
            <img src="budget.jpg" alt="Budget">
            <h3>Budget</h3>
            <p>Track expenses</p>
        </div>

        <div class="card" onclick="location.href='event_order.html'">
            <img src="order.jpg" alt="Orders">
            <h3>Event Orders</h3>
            <p>Manage event orders</p>
        </div>
    </div>
</body>
</html>
