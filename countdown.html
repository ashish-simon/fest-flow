<!DOCTYPE html>
<html>
<head>
<title>Event Countdown</title>
<link rel = "stylesheet" type ="text/css" href= "css/style.css" />
<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #e3f2fd, #f4f6f9);
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.main{
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

.container {
    width: 350px;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

h2 {
    text-align: center;
}

label {
    display: block;
    margin-top: 12px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 20px;
    background: #3498db;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #2980b9;
}

#result {
    margin-top: 15px;
    text-align: center;
    font-weight: bold;
}
</style>

<script>
function calculate() {
    var date = document.getElementById("eventDate").value;

    if(date == "") {
        alert("Select a date");
        return;
    }

    var today = new Date();
    var event = new Date(date);

    var diff = event - today;
    var days = Math.ceil(diff / (1000 * 60 * 60 * 24));

    if(days >= 0)
        document.getElementById("result").innerHTML = "<br><h1 style='color:green'>" + days + " days left for event<h1>";
    else
        document.getElementById("result").innerHTML = "<br><h1 style='color:red'>Event already completed<h1>";
}
</script>

</head>

<body>
    <div class="heading">
        <h1 align = "center">Fest Flow</h1>
    </div>
	<div class="menu">
        <a href="dashboard.html">Home</a>
        <a href="themes.html">Upload Image</a>
        <a href="view_events.php">Suggest Theme</a>
        <a href="add_sponsors.php">Sponsors</a>
        <a href="view_sponsors.php">View Sponsors</a>
        <a href="event_order.html">Events</a>
    </div>
<div  class="main">
<div class="container">
    <h2>Event Countdown</h2>

    <label>Select Event Date:</label>
    <input type="date" id="eventDate">

    <button onclick="calculate()">Check Days Left</button>

    <p id="result"></p>
</div>
</div>

</body>
</html>
